name: Tag and Release on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
  # Keeps the manual button in case you ever need to force a release
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g., v3.0.0)'
        required: true
        type: string

# It's a good practice (and often mandatory nowadays) to grant explicit permissions to the token
permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    # Runs if triggered manually, or if the PR is merged and the source branch starts with 'v'
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event.pull_request.merged == true && startsWith(github.head_ref, 'v'))
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Tag Variable
        id: variables
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ORIGINAL_TAG="${{ github.event.inputs.version_tag }}"
          else
            ORIGINAL_TAG="${{ github.head_ref }}"
          fi

          # Remove leading 'v' if present
          UPDATED_TAG="${ORIGINAL_TAG#v}"

          echo "tag_name=$UPDATED_TAG" >> $GITHUB_OUTPUT

      # softprops/action-gh-release automatically creates the tag if it doesn't exist,
      # so we save a step (and an extra third-party action).
      - name: Create Release and Tag
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.variables.outputs.tag_name }}
          name: Release ${{ steps.variables.outputs.tag_name }}
          body: "https://developer.medallia.com"
          draft: false
          prerelease: false
          # Target the tag to the merge commit
          target_commitish: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

  deploy-to-cocoapods:
    # This job ONLY runs if the previous one finished successfully
    needs: tag-and-release
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods

      - name: Lint Podspec with Private Repo
        run: |
          pod spec lint \
            --sources='https://cdn.cocoapods.org,https://repository.medallia.com/artifactory/api/pods/public-cocoapods' \
            --allow-warnings \
            --verbose

      # Running CocoaPods natively is usually less prone to failure 
      # than relying on third-party actions that might become outdated.
      - name: Deploy to Cocoapods
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          # If you have a specific .podspec file, you can change this command to:
          # pod trunk push YourLibrary.podspec --allow-warnings --skip-tests --skip-import-validation
          pod trunk push --allow-warnings --skip-tests --skip-import-validation
